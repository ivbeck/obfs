name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libgtk-3-dev

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/vpn-obfs-server dist/
          cp target/release/vpn-obfs-client dist/
          cp target/release/vpn-obfs-gui dist/

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Type Directory -Path dist -Force | Out-Null
          Copy-Item target/release/vpn-obfs-server.exe dist/
          Copy-Item target/release/vpn-obfs-client.exe dist/
          Copy-Item target/release/vpn-obfs-gui.exe dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpn-obfs-${{ runner.os }}
          path: dist/*
