name: mutants

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run mutants on common
        run: cargo mutants --workspace --in-place --no-shuffle --timeout 120 --colors never
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutants-report
          path: mutants.out/
